behaviors:
  DroneNav:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-3           # entropy bonus — encourages exploration
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true        # CRITICAL for continuous obs of different scales
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995         # long horizon (mission is ~60s)
        strength: 1.0
    max_steps: 10000000      # 10M steps
    time_horizon: 512
    summary_freq: 25000
    keep_checkpoints: 5
    checkpoint_interval: 250000
    time_scale: 10       # Unity will run 10x faster during training
    fixed_deltatime: 0.01 # Keep physics stable